name: Deploy to GitHub Pages

on:
  # Dispara o deploy sempre que você fizer push na branch principal
  push:
    branches: [main]
  # Permite rodar o deploy manualmente pela aba Actions
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout seu repositório
        uses: actions/checkout@v4

      - name: Instalar, buildar e fazer upload
        uses: withastro/action@v3
        # Esta action oficial da Astro detecta automaticamente se você usa npm, pnpm ou yarn

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy para o GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
